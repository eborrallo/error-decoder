name: Publish to NPM

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Match package.json to the GitHub release tag (no manual version bump before release).
      - name: Set package version from release tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VER="${TAG#v}"
          pnpm version "$VER" --no-git-tag-version --allow-same-version

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build example contracts
        run: forge build
        working-directory: example-contracts

      - name: Run tests
        run: pnpm test

      - name: Build package
        run: pnpm build

      - name: Publish to NPM
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
